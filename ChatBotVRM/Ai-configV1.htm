<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VRM AI URL Generator</title>
    <style>
        /* 1. GLOBAL RESET - Prevents all "leaking" by forcing padding into width calculations */
        * {
            box-sizing: border-box;
        }

        :root {
            --primary: #0ff;
            --secondary: #ff79c6;
            --bg: #050510;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(0, 255, 255, 0.3);
        }

        body {
            margin: 0;
            padding: 40px 20px;
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden; /* Prevents horizontal scroll leaking */
        }

        h1 { color: var(--primary); text-shadow: 0 0 10px var(--primary); margin: 0 0 10px 0; text-align: center; }
        p.subtitle { color: #aaa; margin-bottom: 40px; text-align: center; }

        /* 2. CONTAINER - Strictly limits width */
        .container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
        }

        .section-title {
            border-left: 4px solid var(--secondary);
            padding-left: 15px;
            margin: 30px 0 15px 0;
            font-size: 1.1rem;
            color: var(--secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* 3. GRID - Uses minmax(min(100%, 250px)) to prevent overflow on mobile */
        .grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(100%, 250px), 1fr));
            gap: 15px;
            width: 100%;
        }

        /* 4. INPUT GROUPS - No fixed widths, uses 100% of the grid cell */
        .input-group {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
        }

        label { font-size: 0.8rem; color: #aaa; text-transform: uppercase; }
        small { font-size: 0.7rem; color: #666; margin-top: -5px; }

        input, select {
            background: #111;
            border: 1px solid #333;
            color: white;
            padding: 10px;
            border-radius: 4px;
            font-size: 0.9rem;
            outline: none;
            width: 100%; /* Fills the input-group */
        }

        input:focus { border-color: var(--primary); }

        /* 5. RESULT AREA */
        .result-area {
            width: 100%;
            max-width: 800px;
            background: #111;
            padding: 25px;
            border-radius: 12px;
            border: 2px solid var(--primary);
            margin-top: 40px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
            text-align: center;
            box-sizing: border-box; /* Important for padding */
        }

        #generatedUrl {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--primary);
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            margin-bottom: 20px;
            text-align: center;
            word-break: break-all;
        }

        .btn-container { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }

        button {
            padding: 12px 30px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.3s;
        }

        .btn-generate { background: var(--primary); color: #000; }
        .btn-generate:hover { background: #fff; box-shadow: 0 0 15px var(--primary); }
        .btn-copy { background: var(--secondary); color: #fff; }
        .btn-copy:hover { background: #fff; color: var(--secondary); }

        @media (max-width: 600px) {
            body { padding: 20px 10px; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <h1>🤖 VRM AI URL Maker</h1>
    <p class="subtitle">Configure your AI Avatar parameters and generate a custom link.</p>

    <div class="container">
        
        <!-- STEP 1: BASE URL -->
        <div class="section-title">Step 1: Base Link</div>
        <div class="input-group">
            <label>Your HTML File URL</label>
            <input type="text" id="baseUrl" placeholder="http://localhost:5500/index.html">
        </div>

        <!-- STEP 2: IDENTITY -->
        <div class="section-title">Step 2: Identity & Twitch</div>
        <div class="grid-layout">
            <div class="input-group">
                <label>Avatar Name</label>
                <input type="text" class="param" name="avatar" placeholder="e.g. Luna">
            </div>
            <div class="input-group">
                <label>Twitch Channel</label>
                <input type="text" class="param" name="channel" placeholder="MohTecGames">
            </div>
        </div>

        <!-- STEP 3: AI ENGINE -->
        <div class="section-title">Step 3: AI Engine Settings</div>
        <div class="grid-layout">
            <div class="input-group">
                <label>API Type</label>
                <select id="api_type" class="param" name="api_type" onchange="toggleModeInputs()">
                    <option value="google">Google (Requires Key)</option>
                    <option value="local">Local (localhost)</option>
                    <option value="remote">Remote (Custom IP)</option>
                </select>
            </div>
            <div class="input-group">
                <label>AI Model Name</label>
                <input type="text" class="param" name="model" placeholder="llama3.2:3b-Q3_K_M">
            </div>
            <div class="input-group">
                <label>Context Size</label>
                <input type="text" class="param" name="ctx" placeholder="12000">
            </div>
        </div>

        <!-- CONDITIONAL INPUTS -->
        <div id="google-inputs" class="input-group">
            <label>Google API Key</label>
            <input type="text" class="param" name="key" placeholder="AIzaSy...">
        </div>

        <div id="remote-inputs" class="input-group" style="display:none;">
            <label>Remote IP & Port</label>
            <input type="text" class="param" name="url" placeholder="192.168.2.4:11434">
        </div>

    </div>

    <!-- RESULT AREA -->
    <div class="result-area">
        <input type="text" id="generatedUrl" readonly placeholder="Your generated URL will appear here...">
        <div class="btn-container">
            <button class="btn-generate" onclick="generateURL()">Generate URL</button>
            <button class="btn-copy" onclick="copyUrl()">Copy to Clipboard</button>
        </div>
    </div>

    <script>
        // Handles showing/hiding conditional inputs
        function toggleModeInputs() {
            const mode = document.getElementById('api_type').value;
            document.getElementById('google-inputs').style.display = (mode === 'google') ? 'flex' : 'none';
            document.getElementById('remote-inputs').style.display = (mode === 'remote') ? 'flex' : 'none';
        }

        function generateURL() {
            const baseUrlInput = document.getElementById('baseUrl');
            const baseUrl = baseUrlInput.value.trim();
            
            if (!baseUrl) {
                alert("Please enter a Base URL first!");
                return;
            }

            const params = new URLSearchParams();

            // Select all inputs with class 'param'
            const allInputs = document.querySelectorAll('.param');
            
            allInputs.forEach(input => {
                const val = input.value.trim();
                // ONLY append if the value is NOT empty
                if (val !== "") {
                    params.append(input.name, val);
                }
            });

            const queryString = params.toString();
            const finalUrl = baseUrl + (queryString ? "?" + queryString : "");
            
            document.getElementById('generatedUrl').value = finalUrl;
        }

        function copyUrl() {
            const copyText = document.getElementById("generatedUrl");
            if (!copyText.value || copyText.value.startsWith("Your generated")) return;
            
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(copyText.value);
            
            alert("URL Copied to Clipboard!");
        }
    </script>
</body>
</html>
