<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VRM AI URL Generator</title>
    <style>
        /* Using your existing neon style */
        :root { --primary: #0ff; --secondary: #ff79c6; --bg: #050510; --card-bg: rgba(255, 255, 255, 0.05); --border: rgba(0, 255, 255, 0.3); }
        body { margin: 0; padding: 40px 20px; background-color: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 800px; }
        .section-title { border-left: 4px solid var(--secondary); padding-left: 15px; margin: 30px 0 15px 0; color: var(--secondary); text-transform: uppercase; }
        .input-group { background: var(--card-bg); padding: 15px; border-radius: 8px; border: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        label { font-size: 0.8rem; color: #aaa; text-transform: uppercase; }
        input, select { background: #111; border: 1px solid #333; color: white; padding: 10px; border-radius: 4px; outline: none; width: 100%; }
        input:focus { border-color: var(--primary); }
        .result-area { position: sticky; bottom: 20px; width: 100%; background: #111; padding: 25px; border-radius: 12px; border: 2px solid var(--primary); margin-top: 40px; text-align: center; box-sizing: border-box; }
        #generatedUrl { width: 100%; background: transparent; border: none; color: var(--primary); font-family: monospace; text-align: center; word-break: break-all; margin-bottom: 20px; }
        .btn-container { display: flex; gap: 15px; justify-content: center; }
        button { padding: 12px 30px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; }
        .btn-generate { background: var(--primary); color: #000; }
        .btn-copy { background: var(--secondary); color: #fff; }
    </style>
</head>
<body>

    <h1>🤖 VRM AI URL Maker</h1>
    <div class="container">
        
        <div class="section-title">Step 1: Base Link</div>
        <div class="input-group">
            <label>Your HTML File URL</label>
            <input type="text" id="baseUrl" placeholder="http://localhost:5500/index.html">
        </div>

        <div class="section-title">Step 2: Identity</div>
        <div class="input-group">
            <label>Avatar Name (Trigger Word)</label>
            <input type="text" id="avatar" placeholder="Luna">
        </div>
        <div class="input-group">
            <label>Twitch Channel</label>
            <input type="text" id="channel" placeholder="MohTecGames">
        </div>

        <div class="section-title">Step 3: AI Mode</div>
        <div class="input-group">
            <label>Select Mode</label>
            <select id="api_type" onchange="toggleModeInputs()">
                <option value="google">Google (Requires API Key)</option>
                <option value="local">Local (Default localhost)</option>
                <option value="remote">Remote (Custom IP/Port)</option>
            </select>
        </div>

        <!-- Conditional Inputs -->
        <div id="google-inputs" class="input-group">
            <label>Google API Key</label>
            <input type="text" id="key" placeholder="AIzaSy...">
        </div>

        <div id="remote-inputs" class="input-group" style="display:none;">
            <label>Remote IP & Port</label>
            <input type="text" id="url" placeholder="192.168.2.4:11434">
        </div>

        <div class="section-title">Step 4: Model Settings</div>
        <div class="input-group">
            <label>Model Name</label>
            <input type="text" id="model" placeholder="llama3.2:3b-Q3_K_M">
        </div>
        <div class="input-group">
            <label>Context Size</label>
            <input type="text" id="ctx" placeholder="12000">
        </div>

    </div>

    <div class="result-area">
        <input type="text" id="generatedUrl" readonly>
        <div class="btn-container">
            <button class="btn-generate" onclick="generateURL()">Generate URL</button>
            <button class="btn-copy" onclick="copyUrl()">Copy</button>
        </div>
    </div>

    <script>
        function toggleModeInputs() {
            const mode = document.getElementById('api_type').value;
            document.getElementById('google-inputs').style.display = (mode === 'google') ? 'flex' : 'none';
            document.getElementById('remote-inputs').style.display = (mode === 'remote') ? 'flex' : 'none';
        }

        function generateURL() {
            const baseUrl = document.getElementById('baseUrl').value.trim();
            if (!baseUrl) return alert("Enter Base URL");

            const params = new URLSearchParams();
            params.append('api_type', document.getElementById('api_type').value);
            params.append('avatar', document.getElementById('avatar').value);
            params.append('channel', document.getElementById('channel').value);
            params.append('model', document.getElementById('model').value);
            params.append('ctx', document.getElementById('ctx').value);

            const mode = document.getElementById('api_type').value;
            if (mode === 'google') {
                params.append('key', document.getElementById('key').value);
            } else if (mode === 'remote') {
                params.append('url', document.getElementById('url').value);
            }

            const queryString = params.toString();
            document.getElementById('generatedUrl').value = baseUrl + "?" + queryString;
        }

        function copyUrl() {
            const copyText = document.getElementById("generatedUrl");
            copyText.select();
            navigator.clipboard.writeText(copyText.value);
            alert("Copied!");
        }
    </script>
</body>
</html>
