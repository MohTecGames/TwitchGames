<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VRM AI Chatbot - Pro Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/comfy.js@latest/dist/comfy.min.js"></script>
    <style>
        /* --- OBS TRANSPARENCY SETUP --- */
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: transparent; /* Required for OBS */
            font-family: sans-serif; 
        }
        canvas { 
            display: block; 
            width: 100vw; 
            height: 100vh; 
            background: transparent; /* Required for OBS */
        }

        /* --- SPEECH BUBBLE --- */
        #speech-bubble {
            position: fixed;
            bottom: 150px;
            left: 50%;
            transform: translateX(-50%) scale(0.8);
            background: white;
            border-radius: 25px;
            padding: 15px 30px;
            font-size: 1.2rem;
            color: #333;
            min-width: 300px;
            max-width: 80vw;
            text-align: center;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            z-index: 1000;
            pointer-events: none;
            white-space: pre-wrap;
        }
        #speech-bubble.show { opacity: 1; transform: translateX(-50%) scale(1); }
        #speech-bubble::after {
            content: ''; position: absolute; bottom: -15px; left: 50%;
            transform: translateX(-50%); border-width: 15px 15px 0;
            border-style: solid; border-color: white transparent transparent;
        }

        /* --- HUD & STATUS --- */
        #debug-hud {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #00ff00;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 11px;
            z-index: 2000;
            pointer-events: none;
        }

        #status { 
            position: fixed; 
            bottom: 10px; 
            left: 10px; 
            color: white; 
            font-size: 12px; 
            opacity: 0.5; 
            z-index: 1001; 
        }
    </style>
</head>
<body>

    <div id="debug-hud">
        <div>MODE: <span id="hud-mode">DETECTING...</span></div>
        <div>ANIM: <span id="hud-anim">NONE</span></div>
    </div>

    <div id="status">Initializing Engine...</div>
    <div id="speech-bubble">Hello!</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.176.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.176.0/examples/jsm/",
                "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3/lib/three-vrm.module.min.js",
                "@pixiv/three-vrm-animation": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm-animation@3/lib/three-vrm-animation.module.min.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';
        import { VRMAnimationLoaderPlugin, createVRMAnimationClip } from '@pixiv/three-vrm-animation';

        // ========== CONFIGURATION ==========
        const urlParams = new URLSearchParams(window.location.search);
        const AVATAR_NAME = urlParams.get('avatar') || "AI";
        const TRIGGER_WORD = AVATAR_NAME.toLowerCase();
        const TWITCH_CHANNEL = urlParams.get('channel') || "MohTecGames";

        const MODEL = urlParams.get('model') || "llama3.2:3b-Q3_K_M";
        const CONTEXT_SIZE = parseInt(urlParams.get('ctx')) || 12000;
        
        // --- SIMPLIFIED MODE LOGIC ---
        const API_TYPE = urlParams.get('api_type') || "google"; 
        const GOOGLE_KEY = urlParams.get('key'); // Used if ?api_type=google&key=...
        const REMOTE_IP = urlParams.get('url');  // Used if ?api_type=remote&url=192.168.1.5:11434

        const GOOGLE_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent";
        const LOCAL_URL = "http://localhost:11434/api/chat";

        const VRM_MODEL_URL = './VRM/sample.vrm';
        
        const ANIM_MAP = {
            'Angry': './VRMA/Angry.vrma',
            'Blush': './VRMA/Blush.vrma',
            'Clapping': './VRMA/Clapping.vrma',
            'Goodbye': './VRMA/Goodbye.vrma',
            'Jump': './VRMA/Jump.vrma',
            'LookAround': './VRMA/LookAround.vrma',
            'Relax': './VRMA/Relax.vrma',
            'Sad': './VRMA/Sad.vrma',
            'Sleepy': './VRMA/Sleepy.vrma',
            'Surprised': './VRMA/Surprised.vrma',
            'Thinking': './VRMA/Thinking.vrma',
            'Walk1': './VRMA/Walk1.vrma',
            'Walk2': './VRMA/Walk2.vrma',
            'Walk3': './VRMA/Walk3.vrma',
            'Walk4': './VRMA/Walk4.vrma',
            'Walk5': './VRMA/Walk5.vrma',
            'Walk6': './VRMA/Walk6.vrma',
            'Walk7': './VRMA/Walk7.vrma',
            'Bored': './VRMA/Bored.vrma',             
            'Looking': './VRMA/Looking.vrma',
            'MagicSpellCasting': './VRMA/MagicSpellCasting.vrma',
            'SearchingFilesHigh': './VRMA/SearchingFilesHigh.vrma',
            'TextingWhileStanding': './VRMA/TextingWhileStanding.vrma'
        };

        const SYSTEM_PROMPT = `You are ${AVATAR_NAME}, a friendly 3D avatar. Keep replies under 40 words. No markdown, no bold, no italics.`;

        // ========== ENGINE SETUP ==========
        const scene = new THREE.Scene();
        scene.background = null; // Required for transparency

        // ZOOM OUT: Set Z to 5.5
        const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 20);
        camera.position.set(0, 1.3, 5.5); 

        // ALPHA: Enable alpha: true for transparency
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.3, 0);
        controls.update();

        const light = new THREE.DirectionalLight(0xffffff, 3.0);
        light.position.set(1, 1, 1).normalize();
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 1.0));

        let currentVrm = null, currentMixer = null, currentAction = null;
        const loadedClips = new Map();
        const failedAnims = new Set();
        const STATE = { IDLE: 'IDLE', THINKING: 'THINKING', TALKING: 'TALKING' };
        let currentState = STATE.IDLE;

        const hudMode = document.getElementById('hud-mode');
        const hudAnim = document.getElementById('hud-anim');
        hudMode.textContent = API_TYPE.toUpperCase();

        const loader = new GLTFLoader();
        loader.register((p) => new VRMLoaderPlugin(p));
        loader.register((p) => new VRMAnimationLoaderPlugin(p));

        // ========== CORE LOGIC ==========

        async function playAnimation(name) {
            if (!currentVrm || !loadedClips.has(name)) return;
            const clip = loadedClips.get(name);
            const nextAction = currentMixer.clipAction(clip);
            nextAction.reset().setEffectiveWeight(1).fadeIn(0.5).play();
            if (currentAction) currentAction.fadeOut(0.5);
            currentAction = nextAction;
            hudAnim.textContent = name;
        }

        async function askAI(prompt) {
            currentState = STATE.THINKING;
            playAnimation('Looking');

            const bubble = document.getElementById('speech-bubble');
            bubble.textContent = "Thinking...";
            bubble.classList.add('show');

            // REINFORCEMENT: Force the instruction into the user message
            const reinforcedPrompt = `Please keep the answer under 40 words. ${prompt}`;

            try {
                let finalContent = "";
                let targetUrl = "";
                let isOllamaStyle = false;

                // --- MODE SELECTION ---
                if (API_TYPE === 'google') {
                    if (!GOOGLE_KEY) throw new Error("Google Mode: Missing ?key= in URL");
                    targetUrl = `${GOOGLE_URL}?key=${GOOGLE_KEY}`;
                } 
                else if (API_TYPE === 'local') {
                    targetUrl = LOCAL_URL;
                    isOllamaStyle = true;
                } 
                else if (API_TYPE === 'remote') {
                    if (!REMOTE_IP) throw new Error("Remote Mode: Missing ?url=IP:PORT in URL");
                    // Automatically appends /api/chat to the IP provided
                    targetUrl = `http://${REMOTE_IP}/api/chat`;
                    isOllamaStyle = true;
                } else {
                    throw new Error("Invalid API Type");
                }

                // --- EXECUTION ---
                if (!isOllamaStyle) {
                    // GOOGLE LOGIC
                    const response = await fetch(targetUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: SYSTEM_PROMPT + "\n\nUser: " + reinforcedPrompt }] }] })
                    });

                    const data = await response.json();
                    if (!response.ok) throw new Error(data.error?.message || `HTTP Error ${response.status}`);
                    if (!data.candidates || !data.candidates[0]) throw new Error("AI returned empty response");
                    finalContent = data.candidates[0].content.parts[0].text;

                } else {
                    // OLLAMA (LOCAL OR REMOTE) LOGIC
                    const response = await fetch(targetUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            model: MODEL,
                            messages: [{ role: 'user', content: reinforcedPrompt }],
                            stream: true,
                            options: { num_ctx: CONTEXT_SIZE }
                        })
                    });

                    if (!response.ok) throw new Error(`Server Error: ${response.statusText}`);

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        const chunk = decoder.decode(value, { stream: true });
                        const lines = chunk.split('\n');
                        for (const line of lines) {
                            if (!line.trim()) continue;
                            try {
                                const json = JSON.parse(line);
                                if (json.message && json.message.content) finalContent += json.message.content;
                            } catch (e) {}
                        }
                    }
                }

                typeWriter(finalContent.replace(/[*#_~`]/g, ''));

            } catch (err) {
                console.error("AI Error:", err);
                bubble.textContent = "Err: " + err.message;
                currentState = STATE.IDLE;
                hudAnim.textContent = "NONE";
            }
        }

        function typeWriter(text) {
            currentState = STATE.TALKING;
            playAnimation('TextingWhileStanding');
            const bubble = document.getElementById('speech-bubble');
            let i = 0; bubble.textContent = ""; bubble.classList.add('show');
            
            function type() {
                if (i < text.length) {
                    bubble.textContent += text.charAt(i);
                    i++;
                    setTimeout(type, 40);
                } else {
                    setTimeout(() => {
                        bubble.classList.remove('show');
                        setTimeout(() => { if(!bubble.classList.contains('show')) currentState = STATE.IDLE; }, 1000);
                    }, 5000);
                }
            }
            type();
        }

        // ========== INITIALIZATION ==========

        async function init() {
            // 1. Load VRM
            await new Promise((resolve) => {
                loader.load(VRM_MODEL_URL, (gltf) => {
                    currentVrm = gltf.userData.vrm;
                    VRMUtils.removeUnnecessaryVertices(gltf.scene);
                    scene.add(currentVrm.scene);
                    currentVrm.scene.rotation.y = Math.PI;
                    currentMixer = new THREE.AnimationMixer(currentVrm.scene);
                    resolve();
                });
            });

            // 2. Preload Animations
            const status = document.getElementById('status');
            const keys = Object.keys(ANIM_MAP);
            for (let i = 0; i < keys.length; i++) {
                const name = keys[i];
                status.innerText = `Loading: ${name}`;
                try {
                    await new Promise((res, rej) => {
                        loader.load(ANIM_MAP[name], (gltf) => {
                            const clip = createVRMAnimationClip(gltf.userData.vrmAnimations[0], currentVrm);
                            loadedClips.set(name, clip);
                            res();
                        }, undefined, rej);
                    });
                } catch (e) { failedAnims.add(name); }
            }

            status.innerText = "Ready.";
            setInterval(() => {
                if (currentState === STATE.IDLE) {
                    const rand = keys[Math.floor(Math.random() * keys.length)];
                    playAnimation(rand);
                }
            }, 8000);

            const clock = new THREE.Clock();
            function animate() {
                requestAnimationFrame(animate);
                const delta = clock.getDelta();
                if (currentVrm) currentVrm.update(delta);
                if (currentMixer) currentMixer.update(delta);
                controls.update();
                renderer.render(scene, camera);
            }
            animate();
        }

        ComfyJS.onChat = (user, message) => {
            const msg = message.toLowerCase().trim();
            if (msg.startsWith(TRIGGER_WORD)) {
                const prompt = message.substring(TRIGGER_WORD.length).trim();
                if (prompt.length > 0) askAI(prompt);
                else {
                    const bubble = document.getElementById('speech-bubble');
                    bubble.textContent = `Yes, ${user}?`;
                    bubble.classList.add('show');
                }
            }
        };
        ComfyJS.Init(TWITCH_CHANNEL);

        init();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
