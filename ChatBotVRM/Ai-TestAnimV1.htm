<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VRM Animation Test Bench - Final List</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #111; font-family: sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }

        #ui-overlay {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 20px;
            border-radius: 10px;
            z-index: 100;
            border: 1px solid #444;
            min-width: 300px;
        }

        .status-item { margin-bottom: 10px; font-size: 14px; }
        .label { color: #888; }
        .value { color: #00ff00; font-weight: bold; font-family: monospace; }
        .error { color: #ff4444; }

        #controls { margin-top: 20px; }
        button {
            padding: 10px 20px;
            cursor: pointer;
            background: #444;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
        }
        button:hover { background: #666; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        #startBtn { background: #2e7d32; }
        #startBtn:hover { background: #388e3c; }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <div class="status-item">
            <span class="label">Progress:</span> 
            <span id="progress" class="value">0 / 0</span>
        </div>
        <div class="status-item">
            <span class="label">Current:</span> 
            <span id="current-anim" class="value">None</span>
        </div>
        <div class="status-item">
            <span class="label">Status:</span> 
            <span id="status-text" class="value">Waiting...</span>
        </div>
        <div id="controls">
            <button id="startBtn" disabled>Start Test Sequence</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.176.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.176.0/examples/jsm/",
                "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3/lib/three-vrm.module.min.js",
                "@pixiv/three-vrm-animation": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm-animation@3/lib/three-vrm-animation.module.min.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';
        import { VRMAnimationLoaderPlugin, createVRMAnimationClip } from '@pixiv/three-vrm-animation';

        // ========== CONFIGURATION ==========
        const VRM_MODEL_URL = './VRM/sample.vrm';

        const ANIM_MAP = {
            'Angry': './VRMA/Angry.vrma',
            'Blush': './VRMA/Blush.vrma',
            'Clapping': './VRMA/Clapping.vrma',
            'Goodbye': './VRMA/Goodbye.vrma',
            'Jump': './VRMA/Jump.vrma',
            'LookAround': './VRMA/LookAround.vrma',
            'Relax': './VRMA/Relax.vrma',
            'Sad': './VRMA/Sad.vrma',
            'Sleepy': './VRMA/Sleepy.vrma',
            'Surprised': './VRMA/Surprised.vrma',
            'Thinking': './VRMA/Thinking.vrma',
            'Walk1': './VRMA/Walk1.vrma',
            'Walk2': './VRMA/Walk2.vrma',
            'Walk3': './VRMA/Walk3.vrma',
            'Walk4': './VRMA/Walk4.vrma',
            'Walk5': './VRMA/Walk5.vrma',
            'Walk6': './VRMA/Walk6.vrma',
            'Walk7': './VRMA/Walk7.vrma',
            'Bored': './VRMA/Bored.vrma',             
            'Looking': './VRMA/Looking.vrma',
            'MagicSpellCasting': './VRMA/MagicSpellCasting.vrma',
            'SearchingFilesHigh': './VRMA/SearchingFilesHigh.vrma',
            'TextingWhileStanding': './VRMA/TextingWhileStanding.vrma'
        };


        // ========== ENGINE SETUP ==========
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);
        const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 20);
        camera.position.set(0, 1.3, 4);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.3, 0);
        controls.update();

        const light = new THREE.DirectionalLight(0xffffff, 3.0);
        light.position.set(1, 1, 1);
        light.position.normalize();
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 1.0));

        let currentVrm = null;
        let currentMixer = null;
        let currentAction = null;
        const loadedClips = new Map();
        const failedAnims = new Set();

        const loader = new GLTFLoader();
        loader.register((parser) => new VRMLoaderPlugin(parser));
        loader.register((parser) => new VRMAnimationLoaderPlugin(parser));

        const startBtn = document.getElementById('startBtn');
        const progressEl = document.getElementById('progress');
        const currentAnimEl = document.getElementById('current-anim');
        const statusTextEl = document.getElementById('status-text');

        // ========== TEST LOGIC ==========

        async function playAnimation(name) {
            if (!currentVrm || !loadedClips.has(name)) return;
            const clip = loadedClips.get(name);
            const nextAction = currentMixer.clipAction(clip);
            
            // Smoothly transition to the next animation
            nextAction.reset().setEffectiveWeight(1).fadeIn(0.5);
            nextAction.play();

            if (currentAction) {
                currentAction.fadeOut(0.5);
            }

            currentAction = nextAction;
        }

        async function runTestSequence() {
            startBtn.disabled = true;
            const keys = Object.keys(ANIM_MAP);
            
            for (let i = 0; i < keys.length; i++) {
                const name = keys[i];
                progressEl.textContent = `${i + 1} / ${keys.length}`;
                currentAnimEl.textContent = name;
                
                if (failedAnims.has(name)) {
                    statusTextEl.textContent = "FAILED (Not Loaded)";
                    statusTextEl.className = "value error";
                } else {
                    await playAnimation(name);
                    statusTextEl.textContent = "Playing...";
                    statusTextEl.className = "value";
                }
                // Wait 4 seconds before moving to the next animation
                await new Promise(r => setTimeout(r, 4000));
            }

            statusTextEl.textContent = "Finished!";
            currentAnimEl.textContent = "Done";
            startBtn.disabled = false;
        }

        // ========== INITIALIZATION ==========

        async function init() {
            // 1. Load VRM
            statusTextEl.textContent = "Loading VRM...";
            await new Promise((resolve) => {
                loader.load(VRM_MODEL_URL, (gltf) => {
                    currentVrm = gltf.userData.vrm;
                    VRMUtils.removeUnnecessaryVertices(gltf.scene);
                    scene.add(currentVrm.scene);
                    currentVrm.scene.rotation.y = Math.PI;
                    currentMixer = new THREE.AnimationMixer(currentVrm.scene);
                    resolve();
                });
            });

            // 2. Preload All Animations
            const keys = Object.keys(ANIM_MAP);
            for (let i = 0; i < keys.length; i++) {
                const name = keys[i];
                progressEl.textContent = `${i} / ${keys.length}`;
                statusTextEl.textContent = `Loading: ${name}`;
                try {
                    await new Promise((resolve, reject) => {
                        loader.load(ANIM_MAP[name], (gltf) => {
                            const vrmAnim = gltf.userData.vrmAnimations[0];
                            const clip = createVRMAnimationClip(vrmAnim, currentVrm);
                            loadedClips.set(name, clip);
                            resolve();
                        }, undefined, reject);
                    });
                } catch (e) {
                    console.error(`Failed: ${name}`, e);
                    failedAnims.add(name);
                }
            }

            statusTextEl.textContent = "Ready to Test";
            progressEl.textContent = `${keys.length} / ${keys.length}`;
            startBtn.disabled = false;

            // 3. Start Render Loop
            const clock = new THREE.Clock();
            function animate() {
                requestAnimationFrame(animate);
                const delta = clock.getDelta();
                if (currentVrm) currentVrm.update(delta);
                if (currentMixer) currentMixer.update(delta);
                controls.update();
                renderer.render(scene, camera);
            }
            animate();
        }

        startBtn.addEventListener('click', runTestSequence);
        init();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
