<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation Player</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        #text-container {
            color: var(--text-color);
            font-size: 5rem; font-weight: 800; text-align: center;
            max-width: 90vw; line-height: 1.2;
            display: flex; flex-wrap: wrap; justify-content: center;
        }
        .word {
            display: inline-block; margin: 0 0.25em; opacity: 0;
            transition: transform 1s cubic-bezier(0.22, 1, 0.36, 1), opacity 1s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .word.from-up { transform: translateY(50px); opacity: 0; }
        .word.from-down { transform: translateY(-50px); opacity: 0; }
        .word.visible { transform: translateY(0); opacity: 1; }

        @media (max-width: 768px) { #text-container { font-size: 2.5rem; } }
    </style>
</head>
<body>
    <div id="text-container"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        
        // 1. Parse Parameters with Defaults
        const message = urlParams.get('text') ? decodeURIComponent(urlParams.get('text')) : "Default Message";
        const delay = parseInt(urlParams.get('delay')) || 1000;
        const totalDuration = parseInt(urlParams.get('duration')) || 5000;
        const textColor = urlParams.get('textColor') || "#ffffff";
        const bgColor = urlParams.get('bgColor') || "#000000";

        // 2. Apply Colors to CSS Variables
        document.documentElement.style.setProperty('--text-color', textColor);
        document.documentElement.style.setProperty('--bg-color', bgColor);

        const container = document.getElementById('text-container');
        const words = message.split(" ");
        const intervalTime = totalDuration / words.length;

        function startAnimation() {
            words.forEach((wordText, index) => {
                const span = document.createElement('span');
                span.textContent = wordText;
                span.classList.add('word');
                span.classList.add(index % 2 === 0 ? 'from-up' : 'from-down');
                container.appendChild(span);

                setTimeout(() => {
                    span.classList.add('visible');
                }, delay + (index * intervalTime));
            });
        }

        window.onload = () => setTimeout(startAnimation, delay);
    </script>
</body>
</html>
