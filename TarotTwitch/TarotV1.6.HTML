    <style>
        :root { --gold: #d4af37; --deep-purple: #1a0b2e; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: transparent; font-family: sans-serif; }
        #ui-layer { position: relative; z-index: 10; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; }
        
        /* UI Boxes */
        #question-display, #reading-overlay { 
            background: rgba(26, 11, 46, 0.95); 
            border: 2px solid var(--gold); 
            border-radius: 10px; 
            text-align: center; 
            color: white; 
            opacity: 0; 
            transition: opacity 1s; 
        }
        #question-display { margin-top: 40px; padding: 20px; width: 60%; }
        #question-display.visible { opacity: 0.8; }
        #question-user { color: var(--gold); font-size: 1.5em; font-weight: bold; }
        #question-text { font-style: italic; font-size: 1.2em; }

        /* --- CARD STYLING --- */
        #spread-container { display: flex; justify-content: center; gap: 30px; margin-top: 50px; perspective: 1000px; }
        .card-wrapper { display: flex; flex-direction: column; align-items: center; width: 180px; }

        .card { 
            width: 180px; height: 300px; position: relative;
            transform-style: preserve-3d; transform: rotateY(0deg); 
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .card.flipped { transform: rotateY(180deg); } 

        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 10px; border: 3px solid var(--gold); overflow: hidden;
        }
        .card-back { transform: rotateY(0deg); z-index: 2; }
        .card-back img { width: 100%; height: 100%; object-fit: cover; }
        .card-front { transform: rotateY(180deg); background: #000; z-index: 1; }
        .card-front img { width: 100%; height: 100%; object-fit: cover; }

        /* --- CARD TEXT BOX --- */
        .card-text-container {
            margin-top: 15px; text-align: center; width: 100%;
            opacity: 0; transition: opacity 0.8s ease-in;
            background: rgba(26, 11, 46, 0.95); border: 2px solid var(--gold);
            border-radius: 10px; padding: 10px 5px; box-sizing: border-box;
        }
        .card-text-container.visible { opacity: 0.8; }
        .card-name { color: var(--gold); font-weight: bold; font-size: 1.1em; margin-bottom: 4px; display: block; }
        .card-meaning { color: white; font-size: 0.85em; font-style: italic; display: block; }

        /* --- READING OVERLAY --- */
        #reading-overlay { position: absolute; bottom: 180px; width: 70%; max-width: 800px; padding: 25px; font-size: 1.2em; }
        #reading-overlay.visible { opacity: 0.8; }

        /* --- CHAT & STATUS --- */
        #chat-container { position: absolute; bottom: 10px; width: 450px; height: 150px; display: flex; flex-direction: column; justify-content: flex-end; pointer-events: none; }
        .chat-line { background: rgba(0, 0, 0, 0.6); color: white; padding: 5px 12px; margin: 2px 0; border-radius: 5px; font-size: 15px; animation: fadeIn 0.3s; }
        .chat-user { color: #ff79c6; font-weight: bold; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        #status-bar { 
    position: absolute; 
    top: 10px; 
    left: 10px; 
    font-size: 14px; 
    color: #000; 
    font-weight: bold; 
    z-index: 20; 
    line-height: 1.4; 
    text-align: left; 
} 
        .controls { position: absolute; bottom: 10px; right: 10px; z-index: 100; display: flex; gap: 8px; }
        button { cursor: pointer; padding: 8px 12px; font-size: 11px; border: none; border-radius: 4px; font-weight: bold; }
        #debug-btn { background: #fff; color: #000; }
        #reset-btn { background: #ff4444; color: #fff; }
        #quick-test-btn { background: #44ff44; color: #000; }
    </style>
</head>
<body>

<div id="status-bar">Initializing...</div>

<div id="ui-layer">
    <div id="question-display"><div id="question-user"></div><div id="question-text"></div></div>
    <div id="spread-container"></div>
    <div id="reading-overlay"><div id="reading-text"></div></div>
    <div id="chat-container"></div>
</div>

<div class="controls">
    <button id="debug-btn" onclick="performReading(TWITCH_CHANNEL, 'The cards will speak its truth...')">TEST READING</button>
    <button id="reset-btn" onclick="resetTimer()">Reset Timer (20M)</button>
    <button id="quick-test-btn" onclick="setQuickTimer()">10s Timer</button>
</div>

<script>
    // --- URL PARAMETER LOGIC ---
    const urlParams = new URLSearchParams(window.location.search);

    /**
     * Helper to get value from URL or return default.
     * @param {string} key - The URL parameter name.
     * @param {any} defaultValue - The fallback value.
     */
    function getParam(key, defaultValue) {
        const val = urlParams.get(key);
        if (val === null) return defaultValue;
        
        // If the default is a number, convert the URL string to a number
        if (typeof defaultValue === 'number') {
            return Number(val);
        }
        return val;
    }

    // --- CONFIGURATION (Dynamic with Defaults) ---
    const TWITCH_CHANNEL = getParam("TWITCH_CHANNEL", "MohTecGames"); 
    const COOLDOWN_SECONDS = getParam("COOLDOWN_SECONDS", 20 * 60);        
    const USER_COOLDOWN_SECONDS = getParam("USER_COOLDOWN_SECONDS", 120 * 60);   
    
    const READING_DURATION_MS = getParam("READING_DURATION_MS", 32000);   
    const CARD_FLIP_DELAY_MS = getParam("CARD_FLIP_DELAY_MS", 1200);
    const READ_FLIP_DELAY_MS = getParam("READ_FLIP_DELAY_MS", 12000); 
    
    const STATUS_TEXT_PRIMARY = getParam("STATUS_TEXT_PRIMARY", "<span style='color: gold;'>Type TarotDeck followed by a question or a specific category , List of Commands:</span>");
    const STATUS_TEXT_COMMANDS = getParam("STATUS_TEXT_COMMANDS", "<span style='font-size: 9px;'><br>TarotBeginnings<br>TarotCareer<br>TarotMoney<br>TarotLove<br>TarotFriendsFamily<br>TarotHealth<br>TarotHigherGuidance</span>");

    const CARD_BACK_IMAGE = "Cards/Back.jpg"; 

    const COMMAND_LIST = [
        "tarotdeck", "tarotbeginnings", "tarotcareer", "tarotmoney", 
        "tarotlove", "tarotfriendsfamily", "tarothealth", "tarothigherguidance"
    ];

    const readingTemplates = {
        past: [
            "Your past was heavily influenced by {name} {meaning}.",
            "Looking back, the energy of {name} {meaning} defined your earlier days.",
            "The roots of your journey were shaped by {name} {meaning}."
        ],

    // --- STATE ---
    let gameState = "WAITING"; 
    let timer = 0;

    let userCooldowns = new Map(); 

   // --- DATA ---
    const tarotDeck = [
                 {

            presentMeanings: ["Adventure", "Daring", "Transformation", "Spontaneity", "Freedom", "Optimism", "Carefree nature"],

            love: [

        {

            beginnings: [

            career: [

            "Evaluate your relationship with honesty: is it truly supporting your long-term happiness, or is it just holding you back?"
        ],
        friendsfamily: [
            "Be careful of money issues or power struggles within your close relationships right now", 
            "You might be dealing with a person in your circle who is acting in a manipulative or corrupt way", 
            "If you're feeling taken advantage of, it's time to set some very firm and healthy boundaries", 
            "Approach these situations with a grounded, patient energy, but don't let anyone walk all over you"
        ],
        health: [
            "Stress and worry are starting to take a serious toll on your health-it's time to listen to your body", 
            "Whether it's obsession with perfection or total lack of motivation, your health needs your attention", 
            "Find ways to calm your mind and ground yourself, like yoga, meditation, or spending time in nature", 
            "If things feel overwhelming, please consult a professional-taking care of yourself is the ultimate priority"
        ],
        higherguidance: [
            "Your guides are asking you to take a look at your relationship with money and purpose", 
            "Are you so focused on the material that you've lost sight of your true calling?", 
            "It's time to make friends with money rather than fearing it, and to align your finances with your higher purpose", 
            "Use this moment to recalibrate and ensure your actions are serving your highest good"
        ],
        outcome: [
            "The outcome suggests that things might not go exactly as planned if you continue with your current approach.", 
            "You may face some setbacks due to poor decision-making or a lack of follow-through.", 
            "This is your signal to change gears! Reevaluate your motivations and your methods.", 
            "To turn things around, you'll need to approach your goals with more purpose, momentum, and integrity."
        ]
    } 
  
    ];

  
    const statusBar = document.getElementById('status-bar');
    const questionDisplay = document.getElementById('question-display');
    const questionUser = document.getElementById('question-user');
    const questionText = document.getElementById('question-text');
    const spreadContainer = document.getElementById('spread-container');
    const readingOverlay = document.getElementById('reading-overlay');
    const readingText = document.getElementById('reading-text');

    function resetTimer() { 
        gameState = "WAITING"; 
        timer = 0; 
        userCooldowns.clear(); 
    }
    function setQuickTimer() { gameState = "IDLE"; timer = 10; }
    function getRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    async function performReading(user, question) {
        if (gameState === "READING") return;
        gameState = "READING";
        
        userCooldowns.set(user, Date.now() + (USER_COOLDOWN_SECONDS * 1000));

        questionUser.innerText = user;
        questionText.innerText = `"${question}"`;
        questionDisplay.classList.add('visible');

        spreadContainer.innerHTML = '';
        const selectedCards = [];
        const positions = ["past", "present", "future"];
        const usedParents = new Set(); 

        let deckCopy = [...tarotDeck];
        for (let i = deckCopy.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [deckCopy[i], deckCopy[j]] = [deckCopy[j], deckCopy[i]];
        }

        for (let cardData of deckCopy) {
            if (selectedCards.length === 3) break;

            const parent = cardData.cardparent;
            if (!usedParents.has(parent)) {
                usedParents.add(parent);

                const pos = positions[selectedCards.length];
                const meaningKey = pos + "Meanings";
                const list = cardData[meaningKey] || ["Unknown"];
                const randomMeaning = getRandom(list);
                
                selectedCards.push({ 
                    name: cardData.name, 
                    chosenMeaning: randomMeaning, 
                    position: pos,
                    rawData: cardData 
                });

                const wrapper = document.createElement('div');
                wrapper.className = 'card-wrapper';
                const cardEl = document.createElement('div');
                cardEl.className = 'card';
                cardEl.innerHTML = `
                    <div class="card-face card-back"><img src="${CARD_BACK_IMAGE}"></div\>
                    <div class="card-face card-front"><img src="${cardData.image}"></div\>
                `;
                const textEl = document.createElement('div');
                textEl.className = 'card-text-container';
                textEl.innerHTML = `<span class="card-name"></span><span class="card-meaning"></span>`;

                wrapper.appendChild(cardEl);
                wrapper.appendChild(textEl);
                spreadContainer.appendChild(wrapper);
                
                setTimeout(() => {
                    cardEl.classList.add('flipped');
                    textEl.classList.add('visible'); 
                    textEl.querySelector('.card-name').innerText = cardData.name;
                    textEl.querySelector('.card-meaning').innerText = randomMeaning;
                }, selectedCards.length * CARD_FLIP_DELAY_MS);
            }
        }

        await new Promise(r => setTimeout(r, READ_FLIP_DELAY_MS ));
        
        let finalReading = "";

        selectedCards.forEach((card) => {
            const templates = readingTemplates[card.position];
            const randomTemplate = getRandom(templates);
            finalReading += randomTemplate.replace("{name}", card.name).replace("{meaning}", card.chosenMeaning) + " ";
        });

        activeTopics.forEach(topic => {
            let dataKey = topic.replace("tarot", "");
            if(topic === "tarotfriendsfamily") dataKey = "friendsfamily";

            selectedCards.forEach(card => {
                const topicList = card.rawData[dataKey];
                if (topicList && Array.isArray(topicList)) {
                    const insight = getRandom(topicList);
                    finalReading += `${card.name} suggests: ${insight} .`;
                }
            });
        });

        if (selectedCards.length > 0) {
            const lastCard = selectedCards[selectedCards.length - 1];
            const outcomeList = lastCard.rawData.outcome;
            if (outcomeList) {
                finalReading += `Ultimately, the outcome is: ${getRandom(outcomeList)}`;
            }
        }

        readingText.innerText = finalReading.trim();
        readingOverlay.classList.add('visible');

        setTimeout(() => {
            readingOverlay.classList.remove('visible');
            questionDisplay.classList.remove('visible');
            spreadContainer.innerHTML = '';
            gameState = "IDLE";
            timer = COOLDOWN_SECONDS; 
        }, READING_DURATION_MS);
    }

     function updateTimer() {
        if (gameState === "IDLE") {
            if (timer > 0) timer--;
            else gameState = "WAITING";
        }

        if (gameState === "WAITING") {
            statusBar.innerHTML =  STATUS_TEXT_PRIMARY + "<br>" + STATUS_TEXT_COMMANDS;
        } 
        else if (gameState === "IDLE") {
            const mins = Math.floor(timer / 60);
            const secs = timer % 60;
            statusBar.innerHTML = `Next reading in: ${mins}:${secs < 10 ? '0' : ''}${secs}`;
        } 
        else if (gameState === "READING") {
            statusBar.innerHTML = "🔮 THE CARDS ARE SPEAKING... 🔮";
        }
    }


    ComfyJS.Init(TWITCH_CHANNEL);
    ComfyJS.onChat = (user, message) => {
        const now = Date.now();
        if (userCooldowns.has(user) && userCooldowns.get(user) > now) return;

        const msg = message.toLowerCase();
        activeTopics = COMMAND_LIST.filter(cmd => msg.includes(cmd));
        
        if (activeTopics.length > 0 && gameState === "WAITING") {
            performReading(user, message);
        }
    };

    setInterval(updateTimer, 1000);
</script>
</body>
