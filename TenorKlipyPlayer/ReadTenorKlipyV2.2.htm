<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Twitch Media Overlay Pro</title>
    
    <!-- DEPENDENCY: Comfy.js -->
    <script src="https://cdn.jsdelivr.net/npm/comfy.js@latest/dist/comfy.min.js"></script>

    <style>
        /* UI STYLING */
        body { 
            margin: 0; padding: 0; overflow: hidden; 
            background-color: rgba(0, 0, 0, 0); 
            display: flex; justify-content: center; align-items: center; 
            font-family: 'Segoe UI', sans-serif; 
        }
        canvas { display: block; background-color: transparent; position: absolute; top: 0; left: 0; z-index: 1; }

        /* Debug Dashboard Styling */
        .debug-box {
            position: absolute; left: 10px;
            background: rgba(0, 0, 0, 0.8); color: white;
            padding: 10px; border-radius: 5px;
            font-size: 12px; pointer-events: none; z-index: 100;
            min-width: 150px; max-width: 250px;
            white-space: pre-wrap; 
        }

        .debug-hidden { display: none !important; }

        #config-box { top: 10px; border: 1px solid #0ff; color: #0ff; }
        #cooldown-box { top: 110px; border: 1px solid #ff0; color: #ff0; }
        #ini-box { top: 210px; border: 1px solid #0f0; color: #0f0; }
        #ban-box { top: 310px; border: 1px solid #f00; color: #f00; }

        .summoned-media {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            object-fit: contain; z-index: 5; pointer-events: none; 
            transition: opacity 0.5s ease; 
        }
    </style>
</head>
<body id="gameBody">

<!-- DEBUG DASHBOARD ELEMENTS -->
<div id="config-box" class="debug-box">Config: Loading...</div>
<div id="cooldown-box" class="debug-box">Cooldowns: None</div>
<div id="ini-box" class="debug-box">Whitelist: Empty</div>
<div id="ban-box" class="debug-box">Blacklist: Empty</div>

<canvas id="gameCanvas"></canvas>

<script>
    /**
     * ===========================================================================
     * 1. CONFIGURATION & URL PARAMETERS
     * ==============================================================================
     */
    const urlParams = new URLSearchParams(window.location.search);
    
    const TWITCH_CHANNEL = urlParams.get('channel') || "MohTecGames"; 
    const PERM_SETTING = urlParams.get('perms') || 'everyone';
    const GIF_SIZE_VAL = parseFloat(urlParams.get('size')) || 30; 
    const GIF_DURATION = parseInt(urlParams.get('duration')) || 5000; 
    const UNIVERSAL_CD = parseInt(urlParams.get('u_cd')) || 10000; 
    const USER_CD = parseInt(urlParams.get('user_cd')) || 30000;   
    
    const INI_URL = urlParams.get('ini_url') || './data/users.ini';
    const BAN_URL = urlParams.get('ban_url') || './data/ban.ini';
    
    // KLIPY API KEY (Required for Smart Command)
    const KLIPY_API_KEY = urlParams.get('klipy_key') || ""; 
    
    const DEBUG_MODE = urlParams.get('debug') === 'true';

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const debugElements = document.querySelectorAll('.debug-box');
    const configEl = document.getElementById('config-box');
    const cooldownEl = document.getElementById('cooldown-box');
    const iniEl = document.getElementById('ini-box');
    const banEl = document.getElementById('ban-box');

    if (!DEBUG_MODE) {
        debugElements.forEach(el => el.classList.add('debug-hidden'));
    }

    /**
     * ===========================================================================
     * 2. STATE MANAGEMENT
     * ==============================================================================
     */
    let lastGlobalSummonTime = 0;     
    let userLastSummonTimes = {};     
    let allowedIniUsers = [];         
    let iniLoaded = false;            
    let bannedUsers = [];             
    let banLoaded = false;            

    /**
     * ===========================================================================
     * 3. FILE LOADING & PERMISSIONS
     * ==============================================================================
     */
    function parseFile(text) {
        return text.split(/\r?\n/).map(line => line.trim()).filter(line => line.length > 0);
    }

    async function loadIniFile() {
        try {
            const response = await fetch(INI_URL);
            if (!response.ok) throw new Error("Not Found");
            allowedIniUsers = parseFile(await response.text());
            iniLoaded = true;
        } catch (err) { console.error("❌ Whitelist Error:", err.message); }
    }

    async function loadBanFile() {
        try {
            const response = await fetch(BAN_URL);
            if (!response.ok) throw new Error("Not Found");
            bannedUsers = parseFile(await response.text());
            banLoaded = true;
        } catch (err) { console.error("❌ Blacklist Error:", err.message); }
    }

    Promise.all([loadIniFile(), loadBanFile()]);

    function checkPermission(user, userState) {
        if (banLoaded && bannedUsers.includes(user)) return false;
        if (PERM_SETTING === 'ini') return (iniLoaded && allowedIniUsers.includes(user));
        if (iniLoaded && allowedIniUsers.includes(user)) return true;
        const allowedRoles = PERM_SETTING.split(',');
        if (allowedRoles.includes('everyone')) return true;
        if (allowedRoles.includes('mod') && userState.mod) return true;
        if (allowedRoles.includes('vip') && userState.vip) return true;
        if (allowedRoles.includes('sub') && userState.subscriber) return true;
        return false;
    }

    /**
     * ===========================================================================
     * 4. KLIPY SMART ENGINE
     * ==============================================================================
     */

    function extractSlugFromUrl(url) {
        const regex = /klipy\.com\/(?:gifs|clips|static-memes)\/([^\/\s?#]+)/;
        const match = url.match(regex);
        return match ? match[1] : null;
    }

    async function fetchKlipyMedia(slug) {
        if (!KLIPY_API_KEY) {
            console.error("❌ ERROR: KLIPY_API_KEY is missing in URL parameters!");
            return null;
        }

        const endpoints = ['gifs', 'clips', 'static-memes'];
        for (const type of endpoints) {
            try {
                const apiUrl = `https://api.klipy.com/api/v1/${KLIPY_API_KEY}/${type}/items?slugs=${slug}`;
                const response = await fetch(apiUrl);
                if (response.status === 403) {
                    console.error("❌ ERROR: 403 Forbidden. API Key is likely invalid.");
                    return null;
                }
                const json = await response.json();
                if (json.result && json.data && json.data.data && json.data.data.length > 0) {
                    return json.data.data[0];
                }
            } catch (e) { /* try next endpoint */ }
        }
        return null;
    }

    function summonMedia(type, data) {
        let url = "";
        let el;
        let isVideo = false;

        // CASE A: Direct ID/String (Legacy/Manual commands)
        if (typeof data === 'string') {
            if (type === 'tenor') {
                url = `https://c.tenor.com/${data}/tenor.gif`;
                el = document.createElement('img');
            } else if (type === 'klipy') {
                url = `https://static.klipy.com/ii/${data}.gif`;
                el = document.createElement('img');
            } else if (type === 'klipyvid') {
                url = `https://static.klipy.com/ii/${data}.mp4`;
                el = document.createElement('video');
                el.autoplay = true; el.playsInline = true; el.muted = false;
                isVideo = true;
            }
        } 
        // CASE B: API Object (Smart Command - FIXED with Optional Chaining)
        else if (typeof data === 'object' && data !== null) {
            // Use ?. to prevent "cannot read property mp4 of undefined"
            if (data.file?.mp4?.url) {
                url = data.file.mp4.url;
                el = document.createElement('video');
                el.autoplay = true; el.playsInline = true; el.muted = false;
                el.loop = false;
                isVideo = true;
            } else if (data.file?.gif?.url) {
                url = data.file.gif.url;
                el = document.createElement('img');
            } else if (data.file?.webp?.url) {
                url = data.file.webp.url;
                el = document.createElement('img');
            } else {
                console.error("❌ Klipy API Error: No valid media format found in object.", data);
                return;
            }
        }

        if (!el || !url) return;

        el.src = url;
        el.className = 'summoned-media';
        el.style.width = `${GIF_SIZE_VAL}vw`;
        el.style.height = `${GIF_SIZE_VAL}vh`;

        const startLifecycle = () => {
            document.body.appendChild(el);
            if (isVideo) {
                el.play().catch(e => console.warn("Autoplay prevented:", e));
            }

            setTimeout(() => {
                el.style.opacity = '0'; 
                setTimeout(() => {
                    if (el.parentNode) {
                        if (isVideo) el.pause();
                        document.body.removeChild(el);
                    }
                }, 500);
            }, GIF_DURATION);
        };

        // Improved Loading Handlers
        if (el.tagName === 'IMG') {
            el.onload = startLifecycle;
            if (el.complete) startLifecycle();
        } else if (el.tagName === 'VIDEO') {
            el.oncanplaythrough = startLifecycle;
            // If video is already buffered/ready, fire immediately
            if (el.readyState >= 3) startLifecycle();
            // Safety fallback: If video fails to trigger event, force start after 3s
            setTimeout(() => { if(el.parentNode && el.style.opacity !== '0') startLifecycle(); }, 3000);
        }
    }

    /**
     * ===========================================================================
     * 5. TWITCH INTEGRATION
     * ==============================================================================
     */
    ComfyJS.Init(TWITCH_CHANNEL);

    ComfyJS.onChat = async (user, message, userState) => {
        const msg = message.trim();
        const now = Date.now();
        const parts = msg.split(/\s+/);
        
        let command = parts[0].toLowerCase();
        if (command.startsWith('!')) command = command.substring(1);

        const input = parts[1];
        const validCommands = ['klipyplay', 'klipy', 'tenor', 'klipyvid'];

        if (validCommands.includes(command) && input) {
            
            if (!checkPermission(user, userState)) return;
            if (now - lastGlobalSummonTime < UNIVERSAL_CD) return;
            if (now - (userLastSummonTimes[user] || 0) < USER_CD) return;

            if (command === 'klipyplay') {
                let slug = input.startsWith('http') ? extractSlugFromUrl(input) : input;
                if (slug) {
                    console.log(`[API] Fetching slug: ${slug}`);
                    const mediaData = await fetchKlipyMedia(slug);
                    if (mediaData) {
                        lastGlobalSummonTime = now;
                        userLastSummonTimes[user] = now;
                        summonMedia('klipy', mediaData);
                    }
                }
            } 
            else {
                lastGlobalSummonTime = now;
                userLastSummonTimes[user] = now;
                summonMedia(command, input);
            }
        }
    };

    /**
     * ===========================================================================
     * 6. DEBUG & ENGINE LOOP
     * ==============================================================================
     */
    setInterval(() => {
        if (!DEBUG_MODE) return;
        configEl.innerHTML = `<b style="color:#fff">Config:</b><br>Ch: ${TWITCH_CHANNEL}<br>API Key: ${KLIPY_API_KEY ? '✅' : '❌'}`;
        const now = Date.now();
        const globalRem = Math.max(0, Math.ceil((lastGlobalSummonTime + UNIVERSAL_CD - now) / 1000));
        cooldownEl.innerText = `Global: ${globalRem > 0 ? globalRem + 's' : 'READY'}`;
        iniEl.innerText = `Whitelist: ${allowedIniUsers.length}`;
        banEl.innerText = `Blacklist: ${bannedUsers.length}`;
    }, 1000);

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize);
    resize();
    function loop() { requestAnimationFrame(loop); }
    loop();
</script>
</body>
</html>
