<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Twitch Media Overlay Pro</title>
    
    <!-- DEPENDENCY: Comfy.js -->
    <script src="https://cdn.jsdelivr.net/npm/comfy.js@latest/dist/comfy.min.js"></script>

    <style>
        body { 
            margin: 0; padding: 0; overflow: hidden; 
            background-color: rgba(0, 0, 0, 0); 
            display: flex; justify-content: center; align-items: center; 
            font-family: 'Segoe UI', sans-serif; 
        }
        canvas { display: block; background-color: transparent; position: absolute; top: 0; left: 0; z-index: 1; }

        .debug-box {
            position: absolute; left: 10px;
            background: rgba(0, 0, 0, 0.8); color: white;
            padding: 10px; border-radius: 5px;
            font-size: 12px; pointer-events: none; z-index: 100;
            min-width: 150px; max-width: 250px;
            white-space: pre-wrap; 
        }

        .debug-hidden { display: none !important; }
        #config-box { top: 10px; border: 1px solid #0ff; color: #0ff; }
        #cooldown-box { top: 110px; border: 1px solid #ff0; color: #ff0; }
        #ini-box { top: 210px; border: 1px solid #0f0; color: #0f0; }
        #ban-box { top: 310px; border: 1px solid #f00; color: #f00; }

        .summoned-media {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            object-fit: contain; z-index: 5; pointer-events: none; 
            transition: opacity 0.5s ease; 
        }
    </style>
</head>
<body id="gameBody">

<div id="config-box" class="debug-box">Config: Loading...</div>
<div id="cooldown-box" class="debug-box">Cooldowns: None</div>
<div id="ini-box" class="debug-box">Whitelist: Empty</div>
<div id="ban-box" class="debug-box">Blacklist: Empty</div>

<canvas id="gameCanvas"></canvas>

<script>
    /**
     * 1. CONFIGURATION
     */
    const urlParams = new URLSearchParams(window.location.search);
    const TWITCH_CHANNEL = urlParams.get('channel') || "MohTecGames"; 
    const PERM_SETTING = urlParams.get('perms') || 'everyone';
    const GIF_SIZE_VAL = parseFloat(urlParams.get('size')) || 30; 
    const GIF_DURATION = parseInt(urlParams.get('duration')) || 5000; 
    const UNIVERSAL_CD = parseInt(urlParams.get('u_cd')) || 10000; 
    const USER_CD = parseInt(urlParams.get('user_cd')) || 30000;   
    const INI_URL = urlParams.get('ini_url') || './data/users.ini';
    const BAN_URL = urlParams.get('ban_url') || './data/ban.ini';
    const KLIPY_API_KEY = urlParams.get('klipy_key') || ""; 
    const DEBUG_MODE = urlParams.get('debug') === 'true';

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const debugElements = document.querySelectorAll('.debug-box');
    const configEl = document.getElementById('config-box');
    const cooldownEl = document.getElementById('cooldown-box');
    const iniEl = document.getElementById('ini-box');
    const banEl = document.getElementById('ban-box');

    if (!DEBUG_MODE) debugElements.forEach(el => el.classList.add('debug-hidden'));

    /**
     * 2. STATE
     */
    let lastGlobalSummonTime = 0;     
    let userLastSummonTimes = {};     
    let allowedIniUsers = [];         
    let iniLoaded = false;            
    let bannedUsers = [];             
    let banLoaded = false;            

    /**
     * 3. PERMISSIONS & FILES
     */
    function parseFile(text) { return text.split(/\r?\n/).map(line => line.trim()).filter(line => line.length > 0); }

    async function loadIniFile() {
        try {
            const response = await fetch(INI_URL);
            if (!response.ok) throw new Error("Not Found");
            allowedIniUsers = parseFile(await response.text());
            iniLoaded = true;
        } catch (err) { console.error("❌ Whitelist Error:", err.message); }
    }

    async function loadBanFile() {
        try {
            const response = await fetch(BAN_URL);
            if (!response.ok) throw new Error("Not Found");
            bannedUsers = parseFile(await response.text());
            banLoaded = true;
        } catch (err) { console.error("❌ Blacklist Error:", err.message); }
    }

    Promise.all([loadIniFile(), loadBanFile()]);

    function checkPermission(user, userState) {
        if (banLoaded && bannedUsers.includes(user)) return false;
        if (PERM_SETTING === 'ini') return (iniLoaded && allowedIniUsers.includes(user));
        if (iniLoaded && allowedIniUsers.includes(user)) return true;
        const allowedRoles = PERM_SETTING.split(',');
        if (allowedRoles.includes('everyone')) return true;
        if (allowedRoles.includes('mod') && userState.mod) return true;
        if (allowedRoles.includes('vip') && userState.vip) return true;
        if (allowedRoles.includes('sub') && userState.subscriber) return true;
        return false;
    }

    /**
     * 4. KLIPY ENGINE
     */

    // Regex to detect media extensions even if they have query parameters (?token=...)
    const MEDIA_REGEX = /\.(mp4|gif|webp|webm|mov)(\?|#|$)/i;

    // BRUTE FORCE SEARCH: Digs through every property of the object
    // and returns the first string it finds that matches a media extension.
    function findMediaUrl(obj) {
        if (!obj) return null;
        
        // If the current item is a string, check if it's a media URL
        if (typeof obj === 'string') {
            return MEDIA_REGEX.test(obj) ? obj : null;
        }

        // If it's an object, loop through all its properties
        if (typeof obj === 'object') {
            for (let key in obj) {
                const val = obj[key];
                
                // 1. If the value is a string, check it immediately
                if (typeof val === 'string' && MEDIA_REGEX.test(val)) {
                    return val;
                }
                
                // 2. If the value is another object, dive deeper (recursion)
                if (typeof val === 'object' && val !== null) {
                    const found = findMediaUrl(val);
                    if (found) return found;
                }
            }
        }
        return null;
    }

    function extractSlugFromUrl(url) {
        const regex = /klipy\.com\/(?:gifs|clips|static-memes)\/([^\/\s?#]+)/;
        const match = url.match(regex);
        return match ? match[1] : null;
    }

    async function fetchKlipyMedia(slug) {
        if (!KLIPY_API_KEY) {
            console.error("❌ ERROR: KLIPY_API_KEY is missing!");
            return null;
        }
        const endpoints = ['gifs', 'clips', 'static-memes'];
        for (const type of endpoints) {
            try {
                const apiUrl = `https://api.klipy.com/api/v1/${KLIPY_API_KEY}/${type}/items?slugs=${slug}`;
                const response = await fetch(apiUrl);
                if (response.status === 403) return null;
                const json = await response.json();
                if (json.result && json.data?.data?.length > 0) {
                    return json.data.data[0];
                }
            } catch (e) {}
        }
        return null;
    }

    function summonMedia(type, data) {
        let url = "";
        let el;
        let isVideo = false;

        // --- PATH 1: DIRECT STRING COMMANDS ---
        if (typeof data === 'string') {
            if (type === 'tenor') {
                url = `https://c.tenor.com/${data}/tenor.gif`;
                el = document.createElement('img');
            } else if (type === 'klipy') {
                url = `https://static.klipy.com/ii/${data}.gif`;
                el = document.createElement('img');
            } else if (type === 'klipyvid') {
                url = `https://static.klipy.com/ii/${data}.mp4`;
                el = document.createElement('video');
                el.autoplay = true; el.playsInline = true; el.muted = false;
                isVideo = true;
            }
        } 
        // --- PATH 2: API OBJECT (Brute Force Search) ---
        else if (typeof data === 'object' && data !== null) {
            url = findMediaUrl(data);
            
            if (url) {
                // Determine if it's a video by looking at the extension of the clean URL
                const cleanUrl = url.split(/[?#]/)[0];
                if (/\.(mp4|webm|mov|ogg)$/i.test(cleanUrl)) {
                    el = document.createElement('video');
                    el.autoplay = true; el.playsInline = true; el.muted = false;
                    el.loop = false;
                    isVideo = true;
                } else {
                    el = document.createElement('img');
                }
            }
        }

        if (!el || !url) {
            console.error("❌ summonMedia Error: No valid media URL found.", { type, data });
            return;
        }

        el.src = url;
        el.className = 'summoned-media';
        el.style.width = `${GIF_SIZE_VAL}vw`;
        el.style.height = `${GIF_SIZE_VAL}vh
