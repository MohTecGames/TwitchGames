<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Twitch Space Shooter Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/comfy.js@latest/dist/comfy.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #000; display: flex; justify-content: center; align-items: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; background-color: #050510; }
        #chat-status { position: absolute; top: 10px; left: 10px; color: #0ff; background: rgba(0,0,0,0.7); padding: 8px; border-radius: 5px; pointer-events: none; font-size: 12px; z-index: 10; border: 1px solid #0ff; display: none; }
    </style>
</head>
<body id="gameBody">
<div id="chat-status">Initializing...</div >
<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('chat-status');

    const urlParams = new URLSearchParams(window.location.search);

    // --- NEW PARAMETERS ---
    const DEBUG_MODE = urlParams.get('debug') === 'true';
    const UI_POS = urlParams.get('uiPos') || 'tr'; // tl, tr, bl, br

    if (DEBUG_MODE) {
        statusEl.style.display = 'block';
    }

    // --- 1. GLOBAL CONFIGURABLE PARAMETERS (via URL) ---
    const E_SPEED_MULT = parseFloat(urlParams.get('espeed')) || 1;
    const BURST_COUNT_VAL = parseInt(urlParams.get('burst')) || 3;
    const SPAWN_INTERVAL = parseInt(urlParams.get('spawn')) || 60; 
    // ULT_CD: Cooldown in seconds (default 60)
    const ULT_COOLDOWN_MS = (parseInt(urlParams.get('ultcd')) || 60) * 1000;

    // --- 2. SHIP CONFIGURATION ---
    const SHIP_URL = urlParams.get('ship') || 'ShipHero.png';
    const SHIP_EMOTE_URL = urlParams.get('emote') || 'https://static-cdn.jtvnw.net/emoticons/v2/70433/default/dark/2.0'; 
    const SHIP_EMOTE_X_REL = parseFloat(urlParams.get('emoteX')) || 0.605;
    const SHIP_EMOTE_Y_REL = parseFloat(urlParams.get('emoteY')) || 0.11;

    // --- 3. ENEMY DEFAULTS ---
    const ENEMY_DEFAULTS = {
        1: { img: 'Enemy1.png', emote: 'https://static-cdn.jtvnw.net/emoticons/v2/28087/default/dark/2.0' },
        2: { img: 'Enemy2.png', emote: 'https://static-cdn.jtvnw.net/emoticons/v2/425618/default/dark/2.0' },
        3: { img: 'Enemy3.png', emote: 'https://static-cdn.jtvnw.net/emoticons/v2/114836/default/dark/2.0' },
        4: { img: 'Enemy4.png', emote: 'https://static-cdn.jtvnw.net/emoticons/v2/191313/default/dark/2.0' },
        5: { img: 'Enemy5.png', emote: 'https://static-cdn.jtvnw.net/emoticons/v2/52/default/dark/2.0' }
    };

    const ENEMY_POS_DEFAULTS = {
        1: { ex: 0.39, ey: 0.31 },
        2: { ex: 0.42, ey: 0.25 },
        3: { ex: 0.41, ey: 0.28 },
        4: { ex: 0.45, ey: 0.22 },
        5: { ex: 0.5, ey: 0.2 }
    };

    // --- 4. GAME ENGINE CORE ---
    const TWITCH_CHANNEL = urlParams.get('channel') || "MohTecGames"; 
    let chatMessages = [];
    const MAX_CHAT_LINES = 0; 
    const BURST_COUNT = BURST_COUNT_VAL; 
    const BURST_DELAY = 150;    
    
    const SHIP_EMOTE_SCALE = 0.3; 
    const images = {};
    const enemyEmotes = {}; 
    const imageSources = { ship: SHIP_URL };
    const emoteSources = { ship: SHIP_EMOTE_URL };
    const enemyConfigData = {}; 

    const ENEMY_BASE_CONFIGS = [
        { id: 1, speed: 1, score: 10, size: 120, behavior: 'linear' },
        { id: 2, speed: 3, score: 50, size: 100, behavior: 'linear' },
        { id: 3, speed: 5, score: 100, size: 90, behavior: 'linear' },
        { id: 4, speed: 2, score: 150, size: 130, behavior: 'wander' }, 
        { id: 5, speed: 7, score: 300, size: 140, behavior: 'zigzag' }
    ];

    // --- 5. PRE-PROCESS PARAMETERS ---
    ENEMY_BASE_CONFIGS.forEach(cfg => {
        const id = cfg.id;
        const def = ENEMY_DEFAULTS[id];
        const posDef = ENEMY_POS_DEFAULTS[id];
        const eImg = urlParams.get(`e${id}`) || def.img;
        imageSources[`enemy${id}`] = eImg;
        const eEmoteUrl = urlParams.get(`e${id}_emote`) || def.emote;
        if (eEmoteUrl) emoteSources[`e${id}_emote`] = eEmoteUrl;
        enemyConfigData[id] = {
            ex: parseFloat(urlParams.get(`e${id}_ex`)) || posDef.ex,
            ey: parseFloat(urlParams.get(`e${id}_ey`)) || posDef.ey
        };
    });

    let imagesLoaded = 0;
    const totalImagesToLoad = Object.keys(imageSources).length + Object.keys(emoteSources).length;

    function loadImages(callback) {
        for (let key in imageSources) {
            images[key] = new Image();
            images[key].src = imageSources[key];
            images[key].onload = () => { imagesLoaded++; if (imagesLoaded === totalImagesToLoad) callback(); };
            images[key].onerror = () => { imagesLoaded++; };
        }
        for (let key in emoteSources) {
            const imgObj = new Image();
            imgObj.src = emoteSources[key];
            imgObj.onload = () => { 
                imagesLoaded++; 
                if (key === 'ship') images.shipEmote = imgObj;
                else enemyEmotes[key.replace('_emote', '')] = imgObj;
                if (imagesLoaded === totalImagesToLoad) callback(); 
            };
            imgObj.onerror = () => { imagesLoaded++; };
        }
    }

    let ship, bullets, enemies, particles, stars, score, highScore, gameOver, frameCount;
    let keys = {};
    let cooldowns = { ult1: 0 };

    const SHIP_SCALE = 0.15; 
    const SHIP_WIDTH = 900 * SHIP_SCALE;  
    const SHIP_HEIGHT = 400 * SHIP_SCALE; 
    const BULLET_SPEED = 10; 
   
    highScore = localStorage.getItem('spaceShooterHighScore') || 0;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        initStars();
    }
    window.addEventListener('resize', resize);
    resize();

    function initStars() {
        stars = [];
        for(let i=0; i<100; i++) {
            stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 2 + 1, speed: Math.random() * 3 + 0.5 });
        }
    }

    function init() {
        ship = { x: 50, y: canvas.height / 2, width: SHIP_WIDTH, height: SHIP_HEIGHT, speed: 8 };
        bullets = [];
        enemies = [];
        particles = [];
        score = 0;
        gameOver = false;
        frameCount = 0;
        cooldowns.ult1 = 0; 
    }

    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    function shoot() { bullets.push({ x: ship.x + ship.width, y: ship.y + ship.height / 2, vx: BULLET_SPEED, vy: 0, radius: 6 }); }
    function shoot1() {
        const count = 7; const spreadAngle = Math.PI / 2; 
        for (let i = 0; i < count; i++) {
            const angle = (i / (count - 1) - 0.5) * spreadAngle;
            bullets.push({ x: ship.x + ship.width, y: ship.y + ship.height / 2, vx: Math.cos(angle) * BULLET_SPEED, vy: Math.sin(angle) * BULLET_SPEED, radius: 6 });
        }
    }
    function shoot2() {
        const count = 5; const angles = [Math.PI / 2, Math.PI / 18, 0, -Math.PI / 18, -Math.PI / 2]; 
        for (let i = 0; i < count; i++) {
            bullets.push({ x: ship.x + ship.width, y: ship.y + ship.height / 2, vx: Math.cos(angles[i]) * BULLET_SPEED, vy: Math.sin(angles[i]) * BULLET_SPEED, radius: 6 });
        }
    }
    function ult1(bypassCooldown = false) {
        const now = Date.now();
        if (!bypassCooldown && now < cooldowns.ult1) return;
        const count = 40; const spreadAngle = Math.PI * 0.6; 
        for (let i = 0; i < count; i++) {
            const angle = (i / (count - 1) - 0.5) * spreadAngle;
            bullets.push({ x: ship.x + ship.width, y: ship.y + ship.height / 2, vx: Math.cos(angle) * (BULLET_SPEED * 1.8), vy: Math.sin(angle) * (BULLET_SPEED * 1.8), radius: 6 });
        }
        if (!bypassCooldown) cooldowns.ult1 = now + ULT_COOLDOWN_MS;
    }

    function burst(fn) {
        for (let i = 0; i < BURST_COUNT; i++) { setTimeout(fn, i * BURST_DELAY); }
    }

    ComfyJS.Init(TWITCH_CHANNEL);
    ComfyJS.onChat = (user, message) => {
        const msg = message.toLowerCase().trim();
        if (gameOver) { init(); return; }
        if (msg === 'gamestart') init();
        else if (msg === 'u') ship.y -= 150;
        else if (msg === 'd') ship.y += 150;
        else if (msg === 's1') burst(shoot);
        else if (msg === 's2') burst(shoot1);
        else if (msg === 's3') burst(shoot2);
        else if (msg === 'ult') {
            const now = Date.now();
            if (now >= cooldowns.ult1) { 
                burst(() => ult1(true)); 
                cooldowns.ult1 = now + ULT_COOLDOWN_MS; 
            }
        }
        chatMessages.push({ user: user, text: message });
        if (chatMessages.length > MAX_CHAT_LINES) chatMessages.shift();
    };

    setInterval(() => {
        statusEl.innerText = "Connected to: " + TWITCH_CHANNEL;
    }, 1000);

    function spawnEnemy() {
        const cfg = ENEMY_BASE_CONFIGS[Math.floor(Math.random() * ENEMY_BASE_CONFIGS.length)];
        const id = cfg.id;
        enemies.push({ 
            x: canvas.width + 150, 
            y: Math.random() * (canvas.height - cfg.size), 
            img: `enemy${id}`, 
            speed: (cfg.speed * 0.6) * E_SPEED_MULT, 
            score: cfg.score, 
            size: cfg.size, 
            behavior: cfg.behavior, 
            phase: Math.random() * Math.PI * 2,
            emote: enemyEmotes[`e${id}`] || null,
            exRel: enemyConfigData[id].ex,
            eyRel: enemyConfigData[id].ey
        });
    }

    function createExplosion(x, y) {
        for (let i = 0; i < 20; i++) { particles.push({ x: x, y: y, vx: (Math.random() - 0.5) * 15, vy: (Math.random() - 0.5) * 15, life: 30, color: '#ffcc00' }); }
    }

    function update() {
        if (gameOver) return;
        if (keys['ArrowUp'] || keys['KeyW']) ship.y -= ship.speed;
        if (keys['ArrowDown'] || keys['KeyS']) ship.y += ship.speed;
        if (keys['Space'] && frameCount % 10 === 0) shoot();
        if (keys['KeyE'] && frameCount % 10 === 0) shoot1();
        if (keys['KeyD'] && frameCount % 10 === 0) shoot2();
        if (keys['KeyQ'] && frameCount % 10 === 0) ult1();
        if (ship.y < 0) ship.y = 0;
        if (ship.y > canvas.height - ship.height) ship.y = canvas.height - ship.height;
        stars.forEach(s => { s.x -= s.speed; if (s.x < 0) s.x = canvas.width; });
        bullets.forEach((b, i) => { b.x += b.vx; b.y += b.vy; if (b.x > canvas.width || b.y < 0 || b.y > canvas.height) bullets.splice(i, 1); });
        
        if (frameCount % SPAWN_INTERVAL === 0) spawnEnemy();

        enemies.forEach((e, i) => {
            e.x -= e.speed;
            if (e.behavior === 'zigzag') e.y += Math.sin(frameCount * 0.05 + e.phase) * 4;
            else if (e.behavior === 'wander') e.y += Math.sin(frameCount * 0.02 + e.phase) * 6;
            const padding = 25; 
            if (ship.x + padding < e.x + e.size && ship.x + ship.width - padding > e.x && ship.y + padding < e.y + e.size && ship.y + ship.height - padding > e.y) gameOver = true;
            bullets.forEach((b, bi) => {
                if (b.x > e.x && b.x < e.x + e.size && b.y > e.y && b.y < e.y + e.size) {
                    createExplosion(e.x + e.size/2, e.y + e.size/2);
                    score += e.score; enemies.splice(i, 1); bullets.splice(bi, 1);
                }
            });
            if (e.x < -200) enemies.splice(i, 1);
        });
        particles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.life--; if (p.life <= 0) particles.splice(i, 1); });
        if (score > highScore) { highScore = score; localStorage.setItem('spaceShooterHighScore', highScore); }
        frameCount++;
    }

    function draw() {
        ctx.fillStyle = '#050510';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = 'white';
        stars.forEach(s => { ctx.globalAlpha = s.speed / 4; ctx.fillRect(s.x, s.y, s.size, s.size); });
        ctx.globalAlpha = 1.0;

        if (images.shipEmote) {
            const emoteSize = ship.width * 0.28; 
            const emoteX = ship.x + (ship.width * SHIP_EMOTE_X_REL) - (emoteSize / 2);
            const emoteY = ship.y + (ship.height * SHIP_EMOTE_Y_REL); 
            ctx.drawImage(images.shipEmote, emoteX, emoteY, emoteSize, emoteSize);
        }

        if (images.ship) ctx.drawImage(images.ship, ship.x, ship.y, ship.width, ship.height);

        bullets.forEach(b => { ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, Math.PI*2); ctx.fill(); });
        
        enemies.forEach(e => { 
            if (images[e.img]) {
                if (e.emote) {
                    const eEmoteSize = e.size * SHIP_EMOTE_SCALE;
                    const eEmoteX = e.x + (e.size * e.exRel) - (eEmoteSize / 2);
                    const eEmoteY = e.y + (e.size * e.eyRel);
                    ctx.drawImage(e.emote, eEmoteX, eEmoteY, eEmoteSize, eEmoteSize);
                }
                ctx.drawImage(images[e.img], e.x, e.y, e.size, e.size);
            } else { 
                ctx.fillStyle = 'red'; ctx.fillRect(e.x, e.y, e.size, e.size); 
            }
        });

        particles.forEach(p => { ctx.fillStyle = p.color; ctx.globalAlpha = p.life / 30; ctx.fillRect(p.x, p.y, 4, 4); });
        ctx.globalAlpha = 1.0;

        // --- HUD DRAWING (POSITIONED VIA URL) ---
        let uiX, uiY, uiAlign, isBottom;
        const pos = UI_POS.toLowerCase();

        if (pos === 'tl') { uiX = 20; uiY = 40; uiAlign = 'left'; isBottom = false; }
        else if (pos === 'bl') { uiX = 20; uiY = canvas.height - 40; uiAlign = 'left'; isBottom = true; }
        else if (pos === 'br') { uiX = canvas.width - 20; uiY = canvas.height - 40; uiAlign = 'right'; isBottom = true; }
        else { uiX = canvas.width - 20; uiY = 40; uiAlign = 'right'; isBottom = false; } // Default 'tr'

        ctx.textAlign = uiAlign;
        ctx.fillStyle = "white";
        
        // Score
        ctx.font = "bold 28px Arial";
        ctx.fillText(`Score: ${score}`, uiX, uiY);

        // High Score
        ctx.font = "20px Arial";
        let hsY = isBottom ? uiY - 35 : uiY + 35;
        ctx.fillText(`High Score: ${highScore}`, uiX, hsY);

        // Ult Timer
        const now = Date.now();
        if (cooldowns.ult1 > 0) {
            const remaining = Math.ceil((cooldowns.ult1 - now) / 1000);
            if (remaining > 0) { 
                ctx.fillStyle = "#ff4444"; 
                ctx.font = "bold 16px Arial"; 
                let ultY = isBottom ? hsY - 25 : hsY + 25;
                ctx.fillText(`ULT READY IN: ${remaining}s`, uiX, ultY); 
            }
        }

        // Chat
        const rowHeight = 35;
        chatMessages.forEach((msg, index) => {
            ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
            ctx.fillRect(10, canvas.height - (chatMessages.length - index) * rowHeight, canvas.width - 20, rowHeight - 5);
            ctx.textAlign = "left"; ctx.fillStyle = "#ff79c6"; ctx.font = "16px Arial";
            ctx.fillText(`${msg.user}: ${msg.text}`, 20, canvas.height - (chatMessages.length - index) * rowHeight + 22);
        });

        if (gameOver) {
            ctx.fillStyle = "rgba(0,0,0,0.75)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.textAlign = "center"; ctx.fillStyle = "white"; ctx.font = "bold 60px Arial";
            ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 30);
            ctx.font = "24px Arial"; ctx.fillText("Press Space or Chat to Restart", canvas.width / 2, canvas.height / 2 + 30);
        }
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }
    window.addEventListener('keydown', (e) => { if (gameOver && e.code === 'Space') init(); });

    loadImages(() => { init(); loop(); });
</script>
</body>
</html>
